name: Supabase Keep-Alive

on:
  schedule:
    # Runs every day at 09:00 UTC (you can change this)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET https://uukuqppqotproqkdvngy.supabase.co/rest/v1/ \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
      
      - name: Log keep-alive ping
        run: echo "Supabase keep-alive ping completed at $(date)"
